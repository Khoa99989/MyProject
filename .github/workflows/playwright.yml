# -------------------------------------------------------
# GitHub Actions CI/CD — Playwright Tests
# -------------------------------------------------------
# Full-stack CI: PostgreSQL + Go backend + Vite frontend + Playwright tests
# -------------------------------------------------------

name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend URL (e.g. https://your-app.vercel.app)'
        required: false
        default: 'http://localhost:5173'

env:
  CI: true

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fnb_user
          POSTGRES_PASSWORD: fnb_pass
          POSTGRES_DB: fnb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # SQLite driver requires CGO + gcc
      - name: Install C compiler for CGO
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build and start backend
        working-directory: backend
        run: |
          CGO_ENABLED=1 go build -o server .
          ./server &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Backend is ready"
              break
            fi
            echo "⏳ Waiting for backend... ($i/30)"
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://fnb_user:fnb_pass@localhost:5432/fnb?sslmode=disable
          JWT_SECRET: ci-test-secret-key-for-github-actions
          GIN_MODE: release
          SMTP_HOST: localhost
          SMTP_PORT: "1025"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm ci
          npm run dev -- --host 0.0.0.0 &
          # Wait for frontend to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Frontend is ready"
              break
            fi
            echo "⏳ Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Run Playwright tests (shard ${{ matrix.shard }})
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:5173' }}
          MAILHOG_URL: http://localhost:8025

      - name: Upload Blob Report (for merging)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 7

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-${{ strategy.job-index }}
          path: test-results/
          retention-days: 7

  # Merge all sharded HTML reports into one
  merge-reports:
    name: Merge Reports
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports into HTML
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload Merged Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30
