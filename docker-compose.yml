version: '3.8'

services:
  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@brewly.com
    depends_on:
      - mailhog
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog — local SMTP server + Web UI (view sent emails)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      backend:
        condition: service_healthy

  # Playwright E2E Tests
  playwright:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - BASE_URL=http://frontend:5173
      - API_URL=http://backend:8080
      - CI=true
      - HEADLESS=true
    depends_on:
      - frontend
      - backend
    volumes:
      - ./test-results:/app/test-results
