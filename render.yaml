# Render Blueprint — one-click deploy backend + database
# Docs: https://render.com/docs/blueprint-spec
# Usage: Render Dashboard → New → Blueprint → chọn repo GitHub

databases:
  - name: fnb-db
    plan: free
    databaseName: fnb
    user: fnb_user

services:
  - type: web
    name: fnb-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fnb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://frontend-dotzun8kb-khoa99989s-projects.vercel.app
      - key: GIN_MODE
        value: release
